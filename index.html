<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極致空耳神器</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .tab-container { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #333; color: #aaa; transition: 0.3s; }
        .tab.active { background: #00FF00; color: #000; }
        .btn-clear { background: #ff4757; color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; }
        textarea { flex: 1; background: #1e1e1e; color: #fff; border: 1px solid #333; border-radius: 10px; padding: 12px; font-size: 16px; margin-bottom: 10px; outline: none; resize: none; }
        #o { flex: 1.5; background: #000; color: #ffff00; border: 2px solid #ffff00; border-radius: 10px; padding: 15px; font-size: 24px; font-weight: bold; overflow-y: auto; white-space: pre-wrap; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="tab-container">
        <button id="tab1" class="tab active" onclick="setMode('karaoke')">🎤 台式空耳</button>
        <button id="tab2" class="tab" onclick="setMode('roman')">📖 羅馬拼音</button>
    </div>
    <button class="btn-clear" onclick="clearAll()">🗑️ 一鍵清除</button>
    <textarea id="i" placeholder="貼上韓文歌詞..." oninput="convert()"></textarea>
    <div id="o"></div>

<script>
    let mode = 'karaoke';
    
    // 字典定義
    const dict = {
        karaoke: {
            I: ["嘎", "嘎", "那", "搭", "搭", "拉", "麻", "八", "八", "撒", "撒", "", "基", "基", "七", "卡", "塔", "趴", "哈"],
            M: ["啊", "欸", "呀", "耶", "歐", "欸", "優", "耶", "歐", "哇", "位", "威", "優", "屋", "喔", "位", "威", "ㄩ", "額", "依", "依"],
            F: ["", "", "", "", "恩", "", "", "", "", "", "", "", "", "", "", "", "姆", "", "", "", "", "昂", "", "", "", "", "", ""]
        },
        roman: {
            I: ["g", "kk", "n", "d", "tt", "r", "m", "b", "pp", "s", "ss", "", "j", "jj", "ch", "k", "t", "p", "h"],
            M: ["a", "ae", "ya", "yae", "eo", "e", "yeo", "ye", "o", "wa", "wae", "oe", "yo", "u", "wo", "we", "wi", "yu", "eu", "ui", "i"],
            F: ["", "k", "k", "k", "n", "n", "n", "t", "l", "l", "l", "l", "l", "l", "l", "l", "m", "p", "p", "t", "t", "ng", "t", "t", "t", "t", "p", "t"]
        }
    };

    function setMode(m) {
        mode = m;
        document.getElementById('tab1').classList.toggle('active', m === 'karaoke');
        document.getElementById('tab2').classList.toggle('active', m === 'roman');
        convert();
    }

    function clearAll() {
        document.getElementById('i').value = '';
        document.getElementById('o').innerText = '';
        document.getElementById('i').focus();
    }

    function convert() {
        const inputVal = document.getElementById('i').value;
        const outputDiv = document.getElementById('o');
        const d = dict[mode];
        let result = "";

        for (let i = 0; i < inputVal.length; i++) {
            let code = inputVal.charCodeAt(i) - 44032;
            if (code >= 0 && code <= 11171) {
                let ini = Math.floor(code / 588), med = Math.floor((code % 588) / 28), fin = code % 28;
                let s = "";
                if (ini === 11) {
                    s = d.M[med];
                } else {
                    s = d.I[ini] + d.M[med];
                    if (mode === 'karaoke' && s.length > 1 && s.endsWith("啊")) s = s.slice(0, -1);
                }
                // 羅馬拼音模式加個小空格比較好讀
                result += s + d.F[fin] + (mode === 'roman' ? " " : "");
            } else {
                result += inputVal[i];
            }
        }
        outputDiv.innerText = result.replace(/依依/g, "依").replace(/搭啊/g, "搭");
    }
</script>
</body>
</html>
